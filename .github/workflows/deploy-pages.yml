name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"          # Sirf frontend folder mein changes par run hoga
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:            # Manual run karne ke liye

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload frontend folder as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend          # ⭐ Yeh key hai - tumhara frontend folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4